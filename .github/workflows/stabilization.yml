name: Stabilization Guardrails

on:
  pull_request:
  push:
    branches: [main]

jobs:
  stabilize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run stabilization checks
        run: bash scripts/stabilization/checks.sh